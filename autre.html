<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 BLE Control</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .content {
      max-width: 1100px;
      margin: 40px auto;
      padding: 24px;
    }

    .control-panel {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 24px;
      flex-wrap: wrap;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .left-panel {
      flex: 1 1 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .right-panel {
      flex: 0 1 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      min-width: 150px;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .connectButton {
      background: #2563eb;
      color: white;
    }

    .disconnectButton {
      background: #6b7280;
      color: white;
    }

    .offButton {
      background: #f59e0b;
      color: white;
    }

    .onButton {
      background: #dc2626;
      color: white;
      width: 100%;
      min-height: 120px;
      font-size: 28px;
      font-weight: 700;
      border-radius: 18px;
    }

    .status-box {
      padding: 14px 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
    }

    .gray-label {
      margin: 0;
    }

    @media (max-width: 768px) {
      .control-panel {
        flex-direction: column;
      }

      .right-panel {
        flex: 1 1 auto;
      }

      .onButton {
        min-height: 90px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="control-panel">
      <div class="left-panel">
        <div class="button-row">
          <button id="connectBleButton" class="connectButton">Connect</button>
          <button id="disconnectBleButton" class="disconnectButton">Disconnect</button>
          <button id="resetButton" class="offButton">Reset</button>
        </div>

        <div class="status-box">
          <p class="gray-label">
            BLE state: <strong><span id="bleState" style="color:#d13a30;">Disconnected</span></strong>
          </p>
        </div>
      </div>

      <div class="right-panel">
        <button id="stopButton" class="onButton">Stop motors</button>
      </div>
    </div>
  </div>
</body>
</html>
